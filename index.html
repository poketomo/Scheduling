<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>日程調整アプリ</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <h1>日程調整</h1>
          <p>講師と生徒の予定を、迷わず整えるための5ステップ</p>
        </div>
        <nav id="navTabs" class="nav-tabs"></nav>
        <section class="sidebar-panel compact">
          <h2>保存状況</h2>
          <div id="saveStatus" class="save-status"></div>
        </section>
        <section class="sidebar-panel">
          <h2>現在の状況</h2>
          <dl id="summaryStats" class="stats-list"></dl>
        </section>
      </aside>
      <main class="main">
        <header class="page-header">
          <div>
            <h2 id="pageTitle">講師</h2>
            <p id="pageLead" class="page-lead"></p>
          </div>
          <div class="header-actions">
            <button id="seedButton" class="secondary-btn" type="button">お試しデータを入れる</button>
            <details class="header-menu">
              <summary class="ghost-btn">データ管理</summary>
              <div class="header-menu-panel">
                <button id="resetButton" class="ghost-btn subtle-danger" type="button">すべて削除</button>
              </div>
            </details>
          </div>
        </header>
        <section id="app" class="page-body"></section>
      </main>
    </div>
    <template id="modalTemplate">
      <div class="modal-backdrop">
        <div class="modal">
          <div class="modal-header">
            <h3 class="modal-title"></h3>
            <button class="icon-btn modal-close" type="button" aria-label="閉じる">×</button>
          </div>
          <div class="modal-content"></div>
        </div>
      </div>
    </template>
    <script type="module" src="./app.js"></script>
  </body>
</html>
